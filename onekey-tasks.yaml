defaults:
  stop_timeout_secs: 15
  restart: "no"

log:
  file: "./logs/onekey-run.log"
  append: true
  max_file_bytes: 10485760
  overflow_strategy: "rotate"
  rotate_file_count: 5

actions:
  prepare_dirs:
    executable: "mkdir"
    args: ["-p", "./data", "./data/object-store", "./logs"]
    cwd: "."
    timeout_secs: 10
  build_web_admin:
    executable: "npm"
    args: ["run", "build"]
    cwd: "./web-admin"
    timeout_secs: 180

services:
  api:
    executable: "cargo"
    args: ["run"]
    cwd: "."
    env:
      APP_HOST: "127.0.0.1"
      APP_PORT: "3001"
      APP_LOG: "info"
      APP_AUTO_MIGRATE: "true"
      APP_AUTH_ENABLED: "false"
      APP_DATABASE_URL: "sqlite://data/app.db?mode=rwc"
      APP_OBJECT_STORE_ROOT: "data/object-store"
      APP_OBJECT_STORE_BUCKET: "content-assets"
    autostart: true
    restart: "no"
    stop_timeout_secs: 15
    log:
      file: "./logs/api.log"
      append: true
      max_file_bytes: 10485760
      overflow_strategy: "rotate"
      rotate_file_count: 5
    watch:
      paths: ["./src", "./migration", "./Cargo.toml", "./Cargo.lock"]
      debounce_ms: 700
    hooks:
      before_start: ["prepare_dirs", "build_web_admin"]
